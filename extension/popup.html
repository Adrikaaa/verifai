<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veri.Ai</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Veri.Ai</h1>
            <span class="status">Beta</span>
        </header>
        <main>
            <div class="scan-area">
                <button id="scan-btn">Scan Current Page</button>
            </div>
            <div id="results" class="hidden">
                <div class="score-circle">
                    <span id="score-val">--</span>
                    <small>% Trust</small>
                </div>
                <p id="verdict">Analyzing...</p>
            </div>
        </main>
        <footer>
            <a href="#" id="view-report">View Full Report</a>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
